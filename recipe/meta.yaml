{% set name = "tidb-vector" %}
{% set version = "0.0.14" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tidb_vector-{{ version }}.tar.gz
  sha256: a63f4af54bb91aea51ae55d8cb9528b7bd2d3838181d7978cf5fcadfa8ab2887

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }},<4.0
    - numpy >=1.0.0,<2.0.0
  run_constrained:
    - SQLAlchemy >=1.4,<3

test:
  imports:
    - tidb_vector
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A Python client for TiDB Vector
  home: https://github.com/pingcap/tidb-vector-python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
